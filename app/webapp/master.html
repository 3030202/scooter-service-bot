<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Калькулятор сметы</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: var(--tg-theme-bg-color, #090d16);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #1a2234);
      --text-main: var(--tg-theme-text-color, #f8fafc);
      --text-muted: var(--tg-theme-hint-color, #94a3b8);
      --accent-color: var(--tg-theme-button-color, #10b981);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --card-bg: rgba(26, 34, 52, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 16px;
      padding-bottom: calc(95px + env(safe-area-inset-bottom, 0px));
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .header {
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease-out;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
    }

    .header p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .catalog-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
      transition: transform 0.15s ease, border-color 0.2s ease;
    }

    .item-card.has-qty {
      border-color: var(--accent-color);
      background: rgba(16, 185, 129, 0.12);
    }

    .item-info {
      flex: 1;
      padding-right: 12px;
    }

    .item-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-main);
    }

    .item-price {
      font-size: 13px;
      color: var(--accent-color);
      font-weight: 600;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      border: none;
      color: var(--text-main);
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, background 0.2s ease;
    }

    .qty-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.22);
    }

    .qty-count {
      font-size: 15px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
      color: var(--text-main);
    }

    .custom-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 20px;
    }

    .custom-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text-main);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    input {
      background: var(--secondary-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 11px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--accent-color);
    }

    .add-custom-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 11px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s ease;
    }

    .add-custom-btn:active {
      background: rgba(255, 255, 255, 0.18);
    }

    .summary-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--secondary-bg);
      border-top: 1px solid var(--card-border);
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(14px);
      z-index: 100;
    }

    .total-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .total-amount {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-color);
    }

    .send-btn {
      background: var(--accent-gradient);
      border: none;
      border-radius: var(--radius);
      padding: 12px 22px;
      color: var(--accent-text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .send-btn:active {
      transform: scale(0.96);
      opacity: 0.92;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧾 Смета мастера</h1>
    <p>Выберите работы и детали для формирования расчета</p>
  </div>

  <div id="catalog-container" class="catalog-list">
    <!-- Loaded dynamically -->
  </div>

  <div class="custom-section">
    <div class="custom-title">➕ Кастомная деталь / Доп. работа</div>
    <div class="input-row">
      <input type="text" id="custom-name" placeholder="Название (напр. Замена подшипника)" style="flex: 2;">
      <input type="number" id="custom-price" placeholder="Цена RUB" style="flex: 1;">
    </div>
    <button class="add-custom-btn" onclick="addCustomItem()">Добавить в смету</button>
  </div>

  <div class="summary-bar">
    <div>
      <div class="total-label">Итоговая смета:</div>
      <div class="total-amount" id="total-price">0 RUB</div>
    </div>
    <button class="send-btn" onclick="submitQuote()">Сохранить смету ➔</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.enableClosingConfirmation();
    }

    let selectedItems = {};
    let catalogData = [];

    async function loadCatalog() {
      try {
        const res = await fetch('/api/catalog');
        catalogData = await res.json();
        renderCatalog();
      } catch (e) {
        console.error("Failed to load catalog", e);
        catalogData = [
          { id: 1, title: "Замена BMS платы", base_price: 2500 },
          { id: 2, title: "Прокачка гидравлического тормоза", base_price: 1200 },
          { id: 3, title: "Замена камеры/покрышки", base_price: 1500 },
          { id: 4, title: "Ремонт контроллера", base_price: 3500 },
          { id: 5, title: "Сезонное ТО и гидроизоляция", base_price: 4000 }
        ];
        renderCatalog();
      }
    }

    function renderCatalog() {
      const container = document.getElementById('catalog-container');
      container.innerHTML = '';
      catalogData.forEach(item => {
        const qty = selectedItems[item.id] ? selectedItems[item.id].qty : 0;
        const card = document.createElement('div');
        card.className = 'item-card' + (qty > 0 ? ' has-qty' : '');
        card.innerHTML = `
          <div class="item-info">
            <div class="item-title">${item.title}</div>
            <div class="item-price">${item.base_price} RUB</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
            <span class="qty-count">${qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        `;
        container.appendChild(card);
      });
      calculateTotal();
    }

    function changeQty(id, delta) {
      if (tg?.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }

      const item = catalogData.find(i => i.id === id);
      if (!item) return;

      if (!selectedItems[id]) {
        selectedItems[id] = { id: item.id, title: item.title, price: item.base_price, qty: 0 };
      }

      selectedItems[id].qty += delta;
      if (selectedItems[id].qty <= 0) {
        delete selectedItems[id];
      }
      renderCatalog();
    }

    function addCustomItem() {
      const name = document.getElementById('custom-name').value.trim();
      const price = parseFloat(document.getElementById('custom-price').value);

      if (!name || isNaN(price) || price <= 0) {
        if (tg?.HapticFeedback) {
          tg.HapticFeedback.notificationOccurred('error');
        }
        alert("Заполните название и корректную цену");
        return;
      }

      if (tg?.HapticFeedback) {
        tg.HapticFeedback.notificationOccurred('success');
      }

      const customId = 'custom_' + Date.now();
      catalogData.push({ id: customId, title: name, base_price: price });
      selectedItems[customId] = { id: customId, title: name, price: price, qty: 1 };

      document.getElementById('custom-name').value = '';
      document.getElementById('custom-price').value = '';
      renderCatalog();
    }

    function calculateTotal() {
      let total = 0;
      Object.values(selectedItems).forEach(item => {
        total += item.price * item.qty;
      });
      document.getElementById('total-price').innerText = total + " RUB";
    }

    function submitQuote() {
      const itemsList = Object.values(selectedItems);
      if (itemsList.length === 0) {
        if (tg?.HapticFeedback) {
          tg.HapticFeedback.notificationOccurred('warning');
        }
        alert("Выберите хотя бы одну работу");
        return;
      }

      if (tg?.HapticFeedback) {
        tg.HapticFeedback.notificationOccurred('success');
      }

      let total = 0;
      itemsList.forEach(i => total += i.price * i.qty);

      const payload = {
        action: "master_webapp_quote",
        items: itemsList,
        total_price: total,
        eta: "1-2 дня"
      };

      if (tg) {
        tg.sendData(JSON.stringify(payload));
      } else {
        alert("Смета сохранена: " + JSON.stringify(payload));
      }
    }

    loadCatalog();
  </script>
</body>
</html>
