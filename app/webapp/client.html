<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Диагностика самоката</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: var(--tg-theme-bg-color, #0f172a);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #1e293b);
      --text-main: var(--tg-theme-text-color, #f8fafc);
      --text-muted: var(--tg-theme-hint-color, #94a3b8);
      --accent-color: var(--tg-theme-button-color, #38bdf8);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --card-bg: rgba(30, 41, 59, 0.75);
      --card-border: rgba(255, 255, 255, 0.12);
      --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 20px 16px env(safe-area-inset-bottom, 20px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .header {
      margin-bottom: 24px;
      text-align: center;
      animation: fadeInDown 0.4s ease-out;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .node-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .node-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
    }

    .node-card:active {
      transform: scale(0.96);
    }

    .node-card.selected {
      border-color: var(--accent-color);
      background: rgba(56, 189, 248, 0.18);
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
      transform: translateY(-2px);
    }

    .node-icon {
      font-size: 30px;
      margin-bottom: 8px;
      transition: transform 0.2s ease;
    }

    .node-card.selected .node-icon {
      transform: scale(1.15);
    }

    .node-title {
      font-size: 13px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    textarea {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      resize: vertical;
    }

    textarea:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }

    .submit-btn {
      margin-top: auto;
      width: 100%;
      background: var(--accent-gradient);
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      color: var(--accent-text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .submit-btn:active {
      transform: scale(0.98);
      opacity: 0.92;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛴 Диагностика поломки</h1>
    <p>Выберите проблемный узел электротранспорта</p>
  </div>

  <div class="section-title">Узел самоката</div>
  <div class="node-grid">
    <div class="node-card selected" onclick="selectNode(this, 'Батарея / BMS', '🔋')">
      <div class="node-icon">🔋</div>
      <div class="node-title">Аккумулятор / BMS</div>
    </div>
    <div class="node-card" onclick="selectNode(this, 'Контроллер / Электроника', '⚡')">
      <div class="node-icon">⚡</div>
      <div class="node-title">Контроллер</div>
    </div>
    <div class="node-card" onclick="selectNode(this, 'Мотор-колесо / Покрышка', '🛞')">
      <div class="node-icon">🛞</div>
      <div class="node-title">Мотор / Колесо</div>
    </div>
    <div class="node-card" onclick="selectNode(this, 'Тормозная система', '🛑')">
      <div class="node-icon">🛑</div>
      <div class="node-title">Тормоза</div>
    </div>
    <div class="node-card" onclick="selectNode(this, 'Дисплей / Ручка газа', '🖥️')">
      <div class="node-icon">🖥️</div>
      <div class="node-title">Дисплей / Газ</div>
    </div>
    <div class="node-card" onclick="selectNode(this, 'Плановое ТО / Сборка', '🔧')">
      <div class="node-icon">🔧</div>
      <div class="node-title">Плановое ТО</div>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="details">Подробности поломки / Симптомы</label>
    <textarea id="details" rows="3" placeholder="Опишите, как проявляется неисправность (например, не включается, люфтит руль, шумит колесо)..."></textarea>
  </div>

  <button class="submit-btn" onclick="submitData()">Продолжить в боте ➔</button>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.MainButton.text = "ОТПРАВИТЬ ДАННЫЕ В БОТ";
      tg.MainButton.show();
      tg.MainButton.onClick(submitData);
      tg.enableClosingConfirmation();
    }

    let selectedNode = "Батарея / BMS";

    function selectNode(element, nodeName, icon) {
      if (tg?.HapticFeedback) {
        tg.HapticFeedback.selectionChanged();
      }
      document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
      selectedNode = nodeName;
    }

    async function submitData() {
      if (tg?.HapticFeedback) {
        tg.HapticFeedback.notificationOccurred('success');
      }
      const details = document.getElementById('details').value.trim();
      const telegramId = tg?.initDataUnsafe?.user?.id;
      const payload = {
        action: "client_webapp_select",
        node: selectedNode,
        details: details || "Описание не указано",
        telegram_id: telegramId,
        initDataUnsafe: tg?.initDataUnsafe
      };

      try {
        await fetch('/api/webapp/client_select', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.error("API submit error:", err);
      }

      if (tg) {
        try { tg.sendData(JSON.stringify(payload)); } catch (e) {}
        try { tg.close(); } catch (e) {}
      } else {
        alert("Данные отправлены: " + JSON.stringify(payload));
      }
    }
  </script>
</body>
</html>
