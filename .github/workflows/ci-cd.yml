name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint & Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Validate Python Syntax
        run: python -m compileall app tests

      - name: Run Pytest Test Suite
        run: pytest -q

  docker-build:
    name: Build & Verify Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: scooter-service-bot:latest

  deploy:
    name: Deploy to Production
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export DEBIAN_FRONTEND=noninteractive
            if ! command -v docker >/dev/null 2>&1 || ! docker compose version >/dev/null 2>&1; then
              echo "Installing Docker & Docker Compose..."
              apt-get update && apt-get install -y ca-certificates curl gnupg git
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg || true
              chmod a+r /etc/apt/keyrings/docker.gpg || true
              . /etc/os-release || true
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME:-noble} stable" > /etc/apt/sources.list.d/docker.list || true
              apt-get update && apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin || apt-get install -y docker.io docker-compose-v2 || true
            fi
            mkdir -p /opt/scooter-service-bot
            if [ ! -d /opt/scooter-service-bot/.git ]; then
              echo "Cloning repository..."
              git clone https://github.com/3030202/scooter-service-bot.git /opt/scooter-service-bot
            fi
            cd /opt/scooter-service-bot
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            cat << 'ENV' > .env
            BOT_TOKEN=8713784158:AAGelFIDq-VO80Uuqqc1HKG_JIiN_dz_jxE
            AI_API_KEY=v1.cP221wTBTN7IfK_4bPUlbc0NYVlbe53HvqHJOv17R2qPIY4830wnTCRwbAb0nayPEgaTl7X_7Aw168XMK5mR9qy5jb9sMy39bchiNbxIMxCB6Tt4I1V1tEgwR9ptYEcF
            AI_BASE_URL=https://gpt.mwsapis.ru/projects/d0g4h/openai/v1
            AI_TEXT_MODEL=kimi-k2-6
            AI_TRANSCRIBE_MODEL=whisper-large-v3

            MASTERS_CHAT_ID=-1005569843365
            MASTER_TELEGRAM_IDS=8012450090
            ADMIN_TELEGRAM_IDS=189560971

            POSTGRES_DB=scooter_service
            POSTGRES_USER=scooter_user
            POSTGRES_PASSWORD=scooter_secure_pass_2026
            POSTGRES_HOST=postgres
            POSTGRES_PORT=5432
            DATABASE_URL=postgresql+asyncpg://scooter_user:scooter_secure_pass_2026@postgres:5432/scooter_service

            REDIS_URL=redis://redis:6379/0
            RUN_MIGRATIONS_ON_STARTUP=true

            STORAGE_DIR=storage
            MEDIA_GROUP_WAIT_SECONDS=2.0
